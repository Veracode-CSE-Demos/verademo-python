
name: Package Firewall

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERACODE_FIREWALL_TOKEN: ${{ secrets.VERACODE_FIREWALL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Set Veracode Package Firewall PyPI index
      - name: Configure Veracode PyPI Firewall
        shell: bash
        run: |
          echo "PIP_INDEX_URL=https://:${VERACODE_FIREWALL_TOKEN}@pypi.firewall.veracode.com/simple/" >> "$GITHUB_ENV"


      # Install Dependencies via Veracode Firewall
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url "$PIP_INDEX_URL" -r requirements.txt

      # Django checks
      - name: Django checks
        run: |
          python manage.py check
          python manage.py migrate --noinput
